name: BavaApp
options:
  bundleIdPrefix: com.icvanee
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  BavaApp:
    type: application
    platform: iOS
    sources:
      - BavaApp
    settings:
      base:
        INFOPLIST_FILE: BavaApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.icvanee.bava
        PRODUCT_NAME: Bava
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
    info:
      path: BavaApp/Info.plist
      properties:
        UILaunchScreen: {}
